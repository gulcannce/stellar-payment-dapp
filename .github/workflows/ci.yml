name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # package-lock.json is generated with npm 11 locally; older npm versions
      # bundled with actions/setup-node resolve peer deps differently and
      # report the lock file as out of sync (npm ci fails with "Missing: ...").
      - run: npm install -g npm@11.16.0
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
